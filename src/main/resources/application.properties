# =============================================
# Chess Insights API - Application Configuration
# =============================================

spring.application.name=chess-insights-api

# --- Database (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/chessinsights
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Redis (Caching) ---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- JWT ---
app.jwt.secret=CHANGE_ME_TO_A_REAL_SECRET_KEY_AT_LEAST_256_BITS_LONG_FOR_HS256
app.jwt.expiration-ms=86400000

# --- Chess.com API ---
app.chesscom.base-url=https://api.chess.com/pub
app.chesscom.user-agent=ChessInsightsAPI/1.0 (contact: your-email@example.com)

# --- Sync Scheduler ---
# Runs every day at 3:00 AM
app.sync.cron=0 0 3 * * *

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Server ---
server.port=8080
