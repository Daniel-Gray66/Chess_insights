# =============================================
# Chess Insights API - Application Configuration
# =============================================
spring.application.name=chess-insights-api

# --- Database (PostgreSQL) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chessinsights}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# --- Redis (Caching) ---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- JWT ---
app.jwt.secret=${JWT_SECRET:default_dev_secret_change_me_in_production_at_least_256_bits}
app.jwt.expiration-ms=86400000

# --- Chess.com API ---
app.chesscom.base-url=https://api.chess.com/pub
app.chesscom.user-agent=ChessInsightsAPI/1.0 (contact: your-email@example.com)

# --- Sync Scheduler ---
# Runs every day at 3:00 AM
app.sync.cron=0 0 3 * * *

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Server ---
server.port=8080

# Flyway config
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
